{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg p-4">
            <div class="text-center mb-4">
                <i class="fas fa-user-plus fa-4x text-primary mb-3"></i>
                <h2 class="fw-bold">Register</h2>
                <p class="text-muted">Create your account to start analyzing</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" name="username" class="form-control bg-light border-0" placeholder="johndoe"
                            required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i
                                class="fas fa-envelope text-muted"></i></span>
                        <input type="email" name="email" class="form-control bg-light border-0"
                            placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control bg-light border-0"
                            placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">Create Account</button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0 text-muted">Already have an account? <a href="{{ url_for('auth.login') }}"
                        class="text-primary fw-bold text-decoration-none">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
